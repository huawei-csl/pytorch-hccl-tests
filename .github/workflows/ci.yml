name: Unit tests

on:
  push:
    branches: [master]
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    branches:
      - "**"

jobs:
  run_tests:
    name: Unit tests (${{ matrix.os }}, py${{ matrix.python_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        python_version: ["3.10"]

    steps:
      - uses: actions/checkout@v2
      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements_dev.txt

      - name: Install package with PyTorch/CPU
        run: make install

      - name: Run Tests
        run: make test
